[unix_http_server]
file=/tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
logfile_maxbytes=50MB
logfile_backups=0
pidfile=/tmp/supervisord.pid
umask=002

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:queue-worker]
process_name=%(program_name)s_%(process_num)02d
; --max-jobs=500  : worker gracefully exits after 500 jobs, supervisor restarts it fresh.
;                   Prevents PHP memory leaks from accumulating over days of uptime.
; --memory=256    : worker exits if PHP heap exceeds 256 MB (safety net for heavy jobs).
;                   Note: this tracks PHP heap only, not OS memory of child processes.
command=php /var/www/artisan queue:work redis --sleep=1 --tries=1 --timeout=3660 --max-jobs=500 --memory=256
directory=/var/www
environment=HOME="/home/appuser"
umask=002
; PD_QUEUE_WORKERS controls parallelism. Default: 20 (suitable for servers).
; For local/WSL use, set PD_QUEUE_WORKERS=8 in your .env to save ~1.2 GB idle RAM.
numprocs=%(ENV_PD_QUEUE_WORKERS)s
autostart=true
autorestart=true
startsecs=1
startretries=3
stdout_logfile=/tmp/queue-worker-%(process_num)02d.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=0
stderr_logfile=/tmp/queue-worker-%(process_num)02d-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=0

; Laravel scheduler — runs every minute to process scheduled tasks (memory snapshots,
; stale conversation cleanup, orphaned process cleanup, etc.)
[program:scheduler]
process_name=%(program_name)s
command=php /var/www/artisan schedule:work
directory=/var/www
environment=HOME="/home/appuser"
umask=002
numprocs=1
autostart=true
autorestart=true
startsecs=1
startretries=3
stdout_logfile=/tmp/scheduler.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=0
stderr_logfile=/tmp/scheduler-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=0
